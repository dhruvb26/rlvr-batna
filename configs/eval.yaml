datasets:
  - ji
  - dnd
  - amazon
  - casino
  - craigslist

num_episodes: 100
max_turns: 12
max_concurrent: 16
temperature: 0.7
seed: 42

storage_dir: ./logs/eval

# change opponent to the following for gpt-5.4
